<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link id="pwa-manifest" rel="manifest" href="/manifests/home.webmanifest" />
    <link id="apple-touch-icon" rel="apple-touch-icon" href="/icons/home/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#96C5F7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta id="apple-mobile-web-app-title" name="apple-mobile-web-app-title" content="FAMILY HOTEL" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta
      name="description"
      content="FAMILY HOTEL — база відпочинку в Хмельницькій області, с. Куражин. Номери, ресторан, дитячий майданчик. Бронювання: +38 (098) 061 52 28."
    />
    <title>FAMILY HOTEL — База відпочинку, с. Куражин</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      ;(function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash,
          )
          return
        }
      })(window.location)
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
