<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#96C5F7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Family Booking" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta
      name="description"
      content="Вільні номери та бронювання FAMILY HOTEL."
    />
    <link rel="manifest" href="/manifests/booking.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/booking/apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="/icons/booking/pwa-icon.svg" />
    <title>Family Booking</title>
    <style>
      :root {
        color: #213b5c;
        background: #eef7ff;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
      }

      main {
        width: min(100%, 360px);
        text-align: center;
      }

      img {
        width: 112px;
        height: 112px;
        border-radius: 26px;
        box-shadow: 0 14px 32px rgb(33 59 92 / 18%);
      }

      h1 {
        margin: 20px 0 8px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 32px;
        line-height: 1.1;
      }

      p {
        margin: 0 0 24px;
        color: #657d9d;
        font-size: 16px;
        line-height: 1.5;
      }

      a {
        display: inline-flex;
        min-height: 48px;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        background: #96c5f7;
        color: #213b5c;
        padding: 0 24px;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
    <script>
      ;(function () {
        var isStandalone =
          window.navigator.standalone === true ||
          window.matchMedia('(display-mode: standalone)').matches

        if (isStandalone) {
          window.location.replace('/hotel')
          return
        }

        if ('serviceWorker' in navigator) {
          window.addEventListener('load', function () {
            navigator.serviceWorker.register('/sw.js').catch(function () {})
          })
        }
      })()
    </script>
  </head>
  <body>
    <main>
      <img src="/icons/booking/icon-192.png" alt="" />
      <h1>Family Booking</h1>
      <p>Додайте ярлик на головний екран для швидкого бронювання номерів.</p>
      <a href="/hotel">Відкрити бронювання</a>
    </main>
  </body>
</html>
